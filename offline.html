<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - PCOS Care</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full bg-white rounded-lg shadow-lg p-8 text-center">
        <i class="fas fa-wifi text-6xl text-gray-400 mb-4"></i>
        <h1 class="text-2xl font-bold text-gray-800 mb-4">You're Offline</h1>
        <p class="text-gray-600 mb-6">
            It looks like you've lost your internet connection. Some features may not be available while you're offline.
        </p>
        <div class="space-y-3">
            <div class="flex items-center text-green-600">
                <i class="fas fa-check-circle mr-2"></i>
                <span>View previously loaded pages</span>
            </div>
            <div class="flex items-center text-green-600">
                <i class="fas fa-check-circle mr-2"></i>
                <span>Access cached resources</span>
            </div>
            <div class="flex items-center text-red-600">
                <i class="fas fa-times-circle mr-2"></i>
                <span>Make new predictions</span>
            </div>
            <div class="flex items-center text-red-600">
                <i class="fas fa-times-circle mr-2"></i>
                <span>Save new data</span>
            </div>
        </div>
        <button onclick="window.location.reload()" class="w-full mt-6 bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition duration-300">
            <i class="fas fa-refresh mr-2"></i>Retry Connection
        </button>
    </div>
</body>
</html>
